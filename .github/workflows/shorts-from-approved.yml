name: shorts-from-approved

on:
  schedule:
    - cron: "0 12 * * *"  # Daily at 12:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  create-short:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install FFmpeg
        run: sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore pipeline-data branch
        run: |
          git fetch origin pipeline-data 2>/dev/null || true
          git checkout origin/pipeline-data -- data/ 2>/dev/null || true

      - name: Select Shorts candidate from performance data
        id: select-candidate
        run: |
          python - <<'PY'
          import json
          import os
          from datetime import datetime, timedelta, timezone
          from pathlib import Path

          output = os.environ["GITHUB_OUTPUT"]
          perf_path = Path("data/video_performance.json")

          run_id = ""
          long_video_id = ""

          def parse_iso(value):
              if not value:
                  return None
              try:
                  return datetime.fromisoformat(str(value).replace("Z", "+00:00"))
              except ValueError:
                  return None

          if perf_path.exists():
              data = json.loads(perf_path.read_text())
              now = datetime.now(timezone.utc)
              cutoff = now - timedelta(days=6)

              candidates = []
              for v in data.get("videos", []):
                  if not v.get("video_id") or v.get("video_id") == "dry-run":
                      continue
                  if (v.get("content_type") or "long") == "short":
                      continue
                  if v.get("short_video_id"):
                      continue
                  source_run_id = str(v.get("source_run_id") or "").strip()
                  if not source_run_id:
                      continue
                  upload_time = parse_iso(v.get("upload_time"))
                  if not upload_time or upload_time < cutoff:
                      continue
                  candidates.append((upload_time, v))

              if candidates:
                  candidates.sort(key=lambda x: x[0], reverse=True)
                  chosen = candidates[0][1]
                  run_id = str(chosen.get("source_run_id") or "").strip()
                  long_video_id = str(chosen.get("video_id") or "").strip()

          with open(output, "a", encoding="utf-8") as fh:
              fh.write(f"run_id={run_id}\n")
              fh.write(f"long_video_id={long_video_id}\n")
          PY

      - name: Download candidate artifact
        if: steps.select-candidate.outputs.run_id != ''
        uses: actions/download-artifact@v4
        with:
          name: pipeline-${{ steps.select-candidate.outputs.run_id }}
          path: workspace/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ steps.select-candidate.outputs.run_id }}

      - name: Create and upload Short
        if: steps.select-candidate.outputs.run_id != ''
        env:
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          SHORTS_PRIVACY_STATUS: ${{ vars.SHORTS_PRIVACY_STATUS }}
          TARGET_LONG_VIDEO_ID: ${{ steps.select-candidate.outputs.long_video_id }}
        run: python scripts/run_shorts.py

      - name: Sync performance data to pipeline-data branch
        if: success() && steps.select-candidate.outputs.run_id != ''
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "github-actions[bot]"
          mkdir -p .tmp-data
          cp -f data/video_performance.json .tmp-data/video_performance.json
          cp -f data/api_budget.json .tmp-data/api_budget.json 2>/dev/null || true

          git fetch origin pipeline-data 2>/dev/null || true
          git checkout -B pipeline-data origin/pipeline-data 2>/dev/null || git checkout -b pipeline-data

          mkdir -p data
          cp -f .tmp-data/video_performance.json data/video_performance.json
          cp -f .tmp-data/api_budget.json data/api_budget.json 2>/dev/null || true

          git add data/video_performance.json data/api_budget.json
          git diff --cached --quiet && echo "No performance data changes" || \
            git commit -m "chore: sync shorts performance [skip ci]"
          git push origin pipeline-data

      - name: Skip if no eligible candidate
        if: steps.select-candidate.outputs.run_id == ''
        run: echo "No eligible long video with fresh artifact found — skipping Shorts creation"
