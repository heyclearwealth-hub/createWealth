name: token-keepalive

on:
  schedule:
    - cron: "0 6 1 * *"  # First day of each month at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: none

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ping YouTube API (channels.list — 1 unit)
        env:
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        run: |
          python -c "
          import os
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build

          creds = Credentials(
              token=None,
              refresh_token=os.environ['YOUTUBE_REFRESH_TOKEN'],
              client_id=os.environ['YOUTUBE_CLIENT_ID'],
              client_secret=os.environ['YOUTUBE_CLIENT_SECRET'],
              token_uri='https://oauth2.googleapis.com/token',
              scopes=['https://www.googleapis.com/auth/youtube'],
          )
          yt = build('youtube', 'v3', credentials=creds, cache_discovery=False)
          resp = yt.channels().list(part='id', mine=True).execute()
          print('Channel keepalive OK — channel count:', len(resp.get('items', [])))
          "
